################
### MONITORS ###
################

# Laptop
monitor = eDP-1,2880x1800@120,0x0,1
monitor = WAYLAND-1, disable
monitor = , preferred, auto, 1

###################
### MY PROGRAMS ###
###################

$terminal = footclient
$menu = wofi --show drun
$browser = zen-browser 

#################
### AUTOSTART ###
#################

exec-once = foot --server 
exec-once = hypridle & hyprsunset
exec-once = waybar & awww-daemon & swaync & exec swayosd-server 
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,32
env = HYPRCURSOR_SIZE,32


###################
### PERMISSIONS ###
###################

ecosystem {
  no_update_news = true
  enforce_permissions = 0
}

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 3
    gaps_out = 10

    border_size = 2

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(434a4cee)

    resize_on_border = true 

    allow_tearing = false

    layout = dwindle 
}

decoration {
    rounding = 1
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 1
        passes = 2

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 1, default
    animation = border, 1, 1, easeOutQuint
    animation = windows, 1, 1, easeOutQuint
    animation = windowsIn, 1, 1, easeOutQuint, gnomed
    animation = windowsOut, 1, 1, linear, gnomed 
    animation = fadeIn, 1, 1, almostLinear
    animation = fadeOut, 1, 1, almostLinear
    animation = fade, 1, 1, quick
    animation = layers, 1, 1, easeOutQuint
    animation = layersIn, 1, 1, easeOutQuint, fade
    animation = layersOut, 1, 1, linear, fade
    animation = fadeLayersIn, 1, 1, almostLinear
    animation = fadeLayersOut, 1, 1, almostLinear
    animation = workspaces, 1, 1, quick, slidevert
    animation = specialWorkspace, 1, 1, quick, fade 
}

dwindle {
    force_split = 2
    preserve_split = true 
    pseudotile = true 
}

master {
    new_status = slave
}

misc {
    enable_swallow = true
    swallow_regex = (footclient|foot)
}

#############
### INPUT ###
#############

input {
    kb_layout = ie
    numlock_by_default = true
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    
    repeat_delay = 300
    repeat_rate = 50

    follow_mouse = 1

    sensitivity = 0 

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, vertical, workspace

gestures {
    workspace_swipe_invert = false
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER 

# Main binds
bind = $mainMod SHIFT, C, killactive
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, F, fullscreen
bind = $mainMod, Space, togglefloating
bind = $mainMod, D, exec, $menu
bind = , Multi_Key, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, print, exec, hyprshot -m output -o ~/graf/screenshots -f Seat\ Scáileáin\ ó\ $(date +%Y-%m-%d)\ $(date +%H-%M-%S).png
bind = , print, exec, hyprshot -m region -o ~/graf/screenshots -f Seat\ Scáileáin\ ó\ $(date +%Y-%m-%d)\ $(date +%H-%M-%S).png

# Launch binds
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, KP_Enter, exec, $terminal
bind = $mainMod, E, exec, footclient yazi
bind = $mainMod SHIFT, E, exec, wofi-emoji
bind = $mainMod, L, exec, hyprlock

# Launch submap
bind = $mainMod, W, submap, launch
submap = launch, reset
bind = , E, exec, footclient yazi
bind = , R, exec, footclient newsboat
bind = , W, exec, $browser
bind = , D, exec, discord
bind = , escape, submap, reset
submap = reset

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod SHIFT, mouse:272, resizewindow

#Laptop Lid close opens Hyprlock
bindl = ,switch:Lid Switch, exec, hyprlock

# Multimedia binds
bindel = ,XF86AudioRaiseVolume, exec, exec swayosd-client --output-volume 5
bindel = ,XF86AudioLowerVolume, exec, exec swayosd-client --output-volume -5
bindel = ,XF86MonBrightnessUp, exec, exec swayosd-client --brightness +5
bindel = ,XF86MonBrightnessDown, exec, exec swayosd-client --brightness -5
bindel = ,XF86AudioMute, exec, exec swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, exec swayosd-client --input-volume mute-toggle

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = $mainMod, bracketleft, exec, playerctl previous 
bindl = $mainMod, bracketright, exec, playerctl next

##############################
### WINDOWS AND WORKSPACES ###
##############################

layerrule {
    name = waybarblur
    match:namespace = waybar
    blur = on
}

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# Shttps://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
# windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
# windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
